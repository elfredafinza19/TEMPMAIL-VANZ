<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPMAIL-VANZ</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 p-5 shadow-md">
        <div class="container mx-auto flex items-center justify-between flex-wrap gap-3">
            <h1 class="text-white text-xl font-bold">⚡ TEMPMAIL-VANZ</h1>
            <div class="flex space-x-4">
                <a href="#email-gen" class="text-white hover:text-blue-200 transition">Email</a>
                <a href="#inbox" class="text-white hover:text-blue-200 transition">Inbox</a>
                <a href="#domain" class="text-white hover:text-blue-200 transition">Domains</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-5 max-w-3xl">

        <!-- Email Generation -->
        <section id="email-gen" class="mb-10">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Generate Temporary Email</h2>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex gap-2 mb-4">
                    <input
                        id="email-display"
                        type="text"
                        readonly
                        placeholder="Click Generate to get your email"
                        class="border rounded-lg p-2 w-full bg-gray-50 text-gray-700 cursor-default focus:outline-none"
                    >
                    <button
                        id="copy-btn"
                        onclick="copyEmail()"
                        class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg transition whitespace-nowrap"
                        title="Copy to clipboard"
                    >
                        📋 Copy
                    </button>
                </div>
                <div class="flex gap-2">
                    <button
                        onclick="generateEmail()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition font-medium"
                    >
                        ✨ Generate
                    </button>
                    <button
                        onclick="refreshInbox()"
                        class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg transition font-medium"
                    >
                        🔄 Refresh Inbox
                    </button>
                </div>
                <p id="status-msg" class="mt-3 text-sm text-gray-500"></p>
            </div>
        </section>

        <!-- Inbox -->
        <section id="inbox" class="mb-10">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold text-gray-800">Inbox</h2>
                <span id="auto-refresh-badge" class="text-xs text-gray-400 hidden">Auto-refresh: <span id="countdown">5</span>s</span>
            </div>
            <div id="inbox-container" class="bg-white p-6 rounded-lg shadow">
                <p class="text-gray-400 text-center">Generate an email above to start receiving messages.</p>
            </div>
        </section>

        <!-- Domain Management -->
        <section id="domain">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Domain Management</h2>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex gap-2 mb-4">
                    <input
                        id="domain-input"
                        type="text"
                        placeholder="example.com"
                        class="border rounded-lg p-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >
                    <button
                        onclick="addDomain()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition whitespace-nowrap"
                    >
                        ➕ Add
                    </button>
                </div>
                <div id="domains-list">
                    <p class="text-gray-400 text-center text-sm">Loading domains…</p>
                </div>
            </div>
        </section>

    </main>

    <script>
        let currentEmail = null;
        let autoRefreshTimer = null;
        let countdownTimer = null;
        let countdownValue = 5;

        // ── Helpers ──────────────────────────────────────────────────────────

        function setStatus(msg, color = 'text-gray-500') {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = `mt-3 text-sm ${color}`;
        }

        // ── Email generation ─────────────────────────────────────────────────

        async function generateEmail() {
            setStatus('Generating…', 'text-blue-500');
            try {
                const res = await fetch('/api/emails/generate', { method: 'POST' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                currentEmail = data.address;
                document.getElementById('email-display').value = currentEmail;
                setStatus('Email ready! Inbox auto-refreshes every 5 s.', 'text-green-600');
                startAutoRefresh();
                refreshInbox();
            } catch (err) {
                setStatus('Failed to generate email: ' + err.message, 'text-red-500');
            }
        }

        function copyEmail() {
            if (!currentEmail) {
                setStatus('Generate an email first.', 'text-yellow-600');
                return;
            }
            navigator.clipboard.writeText(currentEmail).then(() => {
                setStatus('✅ Copied to clipboard!', 'text-green-600');
            }).catch(() => {
                setStatus('❌ Could not copy. Please copy the address manually.', 'text-red-500');
            });
        }

        // ── Inbox ────────────────────────────────────────────────────────────

        async function refreshInbox() {
            if (!currentEmail) return;
            const container = document.getElementById('inbox-container');
            try {
                const res = await fetch(`/api/emails/${encodeURIComponent(currentEmail)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const emails = await res.json();

                if (!emails.length) {
                    container.innerHTML = '<p class="text-gray-400 text-center">No messages yet. Your inbox is empty.</p>';
                    return;
                }

                container.innerHTML = emails.map(email => `
                    <div class="border-b last:border-0 py-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-medium text-gray-800">${escapeHtml(email.subject || '(no subject)')}</p>
                                <p class="text-sm text-gray-500">From: ${escapeHtml(email.sender || 'unknown')}</p>
                            </div>
                            <span class="text-xs text-gray-400 whitespace-nowrap ml-4">${formatDate(email.received_at)}</span>
                        </div>
                        <p class="mt-2 text-gray-600 text-sm whitespace-pre-wrap">${escapeHtml(email.body || '')}</p>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-center">Error loading inbox: ${escapeHtml(err.message)}</p>`;
            }
        }

        function startAutoRefresh() {
            clearInterval(autoRefreshTimer);
            clearInterval(countdownTimer);

            const badge = document.getElementById('auto-refresh-badge');
            const countdownEl = document.getElementById('countdown');
            badge.classList.remove('hidden');
            countdownValue = 5;
            countdownEl.textContent = countdownValue;

            countdownTimer = setInterval(() => {
                countdownValue--;
                countdownEl.textContent = countdownValue;
                if (countdownValue <= 0) countdownValue = 5;
            }, 1000);

            autoRefreshTimer = setInterval(() => {
                countdownValue = 5;
                refreshInbox();
            }, 5000);
        }

        // ── Domain management ────────────────────────────────────────────────

        async function loadDomains() {
            const container = document.getElementById('domains-list');
            try {
                const res = await fetch('/api/domains');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const domains = await res.json();

                if (!domains.length) {
                    container.innerHTML = '<p class="text-gray-400 text-center text-sm">No domains added yet.</p>';
                    return;
                }

                container.innerHTML = `<ul class="divide-y">${domains.map(d => `
                    <li class="flex items-center justify-between py-2">
                        <span class="text-gray-700">${escapeHtml(d.domain_name)}</span>
                        <button
                            data-remove-domain="${escapeHtml(d.domain_name)}"
                            class="text-red-500 hover:text-red-700 text-sm transition"
                        >🗑 Remove</button>
                    </li>
                `).join('')}</ul>`;

                // Attach click handlers after rendering to avoid inline onclick XSS
                container.querySelectorAll('[data-remove-domain]').forEach(btn => {
                    btn.addEventListener('click', () => removeDomain(btn.dataset.removeDomain));
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-sm">Error loading domains: ${escapeHtml(err.message)}</p>`;
            }
        }

        async function addDomain() {
            const input = document.getElementById('domain-input');
            const domain = input.value.trim();
            if (!domain) {
                alert('Please enter a domain name.');
                return;
            }
            try {
                const res = await fetch('/api/domains', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                input.value = '';
                await loadDomains();
            } catch (err) {
                alert('Failed to add domain: ' + err.message);
            }
        }

        async function removeDomain(domain) {
            if (!confirm(`Remove domain "${domain}"?`)) return;
            try {
                const res = await fetch(`/api/domains/${encodeURIComponent(domain)}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                await loadDomains();
            } catch (err) {
                alert('Failed to remove domain: ' + err.message);
            }
        }

        // ── Utilities ────────────────────────────────────────────────────────

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(iso) {
            if (!iso) return '';
            try {
                return new Date(iso).toLocaleString();
            } catch (_) {
                return iso;
            }
        }

        // ── Init ─────────────────────────────────────────────────────────────
        loadDomains();
    </script>

</body>
</html>
